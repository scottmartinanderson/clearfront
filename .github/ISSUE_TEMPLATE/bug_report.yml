name: Bug Report
description: Report a defect or unexpected behavior in Clearfront.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps required to trigger the bug.
      placeholder: |
        1. Run `clearfront email target@example.com`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include full error output where applicable.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.4, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9  (output of `python --version`)"
    validations:
      required: true

  - type: input
    id: clearfront_version
    attributes:
      label: Clearfront version
      placeholder: "e.g. 2.5.0  (output of `clearfront --version`)"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM backend
      options:
        - Anthropic Claude (default)
        - Ollama
        - Not applicable (direct CLI or MCP)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, tracebacks, screenshots, or anything else that may help diagnose the issue.
    validations:
      required: false
