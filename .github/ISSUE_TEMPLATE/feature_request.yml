name: Feature Request
description: Propose a new feature or enhancement for Clearfront.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve, not just the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: >
        What problem does this feature solve? Describe the gap in the current behavior
        and why it matters.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Your preferred approach to solving the problem.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you ruled them out.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to implement this feature.
