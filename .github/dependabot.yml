version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  # Grouped so each week's updates arrive as a single pull request.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    groups:
      python-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the CI workflow, also grouped into one PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"
