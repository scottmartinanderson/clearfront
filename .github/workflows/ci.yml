name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,web,dev]"

      - name: Lint (ruff)
        # Matches the repo's enforced gate: pyflakes (F) + runtime-error (E9) rules.
        # Import-order (I001) is known cosmetic debt and is intentionally not gated.
        run: ruff check --select F,E9 .

      - name: Test
        # The test suite is self-contained (no network, no external OSINT binaries).
        # The pytest-freezegun plugin is broken on 3.12, so it is disabled here.
        run: pytest -q -p no:freezegun
